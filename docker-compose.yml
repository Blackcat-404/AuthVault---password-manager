# Development compose file.
# Production docker-compose.yml is generated by the installer in ~/.authvault/

services:
    authvault-app:
        build:
            context: ./PasswordManager
        container_name: authvault-app
        env_file: .env
        volumes:
            - ./PasswordManager/certs:/app/certs:ro
        ports:
            - "${HTTPS_PORT:-7108}:${HTTPS_PORT:-7108}"
            - "${HTTP_PORT:-5168}:${HTTP_PORT:-5168}"
        depends_on:
            authvault-db:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - authvault-net

    authvault-db:
        image: postgres:16-alpine
        container_name: authvault-db
        environment:
            POSTGRES_DB: authvaultdb
            POSTGRES_USER: authvault
            POSTGRES_PASSWORD: "${DB_PASSWORD}"
        volumes:
            - authvault-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U authvault -d authvaultdb"]
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 10s
        restart: unless-stopped
        networks:
            - authvault-net

volumes:
    authvault-data:
        name: authvault-data

networks:
    authvault-net:
        driver: bridge
